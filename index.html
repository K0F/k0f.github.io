---
layout: default
---

<section>
  <ul>

    {% for post in site.posts %}

    <li>
      <div class="post-date">
        <span>{{ post.date | date: "%b %d, %Y" }}</span>
      </div>
      <div class="title">
        {% assign titulek = post.title | split: "." | first %}
        <a href="{{ post.url | relative_url }}">{{ titulek }}</a>
      </div>
    </li>

    {% endfor %}

  </ul>
</section>
